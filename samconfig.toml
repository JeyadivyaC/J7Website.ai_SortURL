version = 0.1

# Used only by a bare `sam deploy` with no --config-env. NOT inherited by
# the dev/prod stanzas below - SAM CLI reads exactly one [<env>.deploy.parameters]
# section per invocation and does not merge it with [default...]. Every
# setting an environment needs (including resolve_s3/s3_prefix) must be
# repeated in that environment's own stanza.
[default.deploy.parameters]
stack_name = "j7website-short-url"
resolve_s3 = true
s3_prefix = "j7website-short-url"
region = "ap-southeast-2"
capabilities = "CAPABILITY_NAMED_IAM"
confirm_changeset = true
disable_rollback = false
image_repositories = []

# `sam deploy --config-env dev`
# Replace every CHANGE_ME below with real values before deploying — none of
# these parameters have a real default, by design (see README "Deployment").
# VpcSubnetIds/VpcSecurityGroupIds are intentionally omitted here - they
# default to "" (no VPC attachment), which is correct for a publicly
# reachable MongoDB deployment (e.g. Atlas with IP allowlisting). Only add
# them if your MongoDB is reachable solely from inside a VPC, e.g.:
#   "VpcSubnetIds=subnet-aaaa,subnet-bbbb",
#   "VpcSecurityGroupIds=sg-cccc",
[dev.deploy.parameters]
stack_name = "j7website-short-url-dev"
resolve_s3 = true
s3_prefix = "j7website-short-url"
region = "ap-southeast-2"
capabilities = "CAPABILITY_NAMED_IAM"
confirm_changeset = true
parameter_overrides = [
  "Environment=dev",
  "SecretName=j7website/short-url/dev/db",
  "BaseUrl=https://s.jseven.ai",
  "LogRetentionDays=14",
  # This account's IAM grant only allows creating roles named "j7website-*",
  # carrying this account's permissions boundary - see infra/aws-bootstrap/.
  "FunctionRoleName=j7website-short-url-dev-role",
  "PermissionsBoundaryArn=arn:aws:iam::857475015624:policy/boundary-j7website-team",
  # Custom domain, already attached to the CloudFront distribution (verify
  # this cert shows "Issued" in Certificate Manager, us-east-1, before
  # relying on it). DNS CNAME for s.jseven.ai -> the CloudFront distribution
  # domain (see stack output CloudFrontUrl) is managed outside this stack.
  "DomainName=s.jseven.ai",
  "AcmCertificateArn=arn:aws:acm:us-east-1:857475015624:certificate/ea751728-0df5-4cd6-92fb-fa56736026b6"
]

# `sam deploy --config-env prod`
[prod.deploy.parameters]
stack_name = "j7website-short-url-prod"
resolve_s3 = true
s3_prefix = "j7website-short-url"
region = "ap-southeast-2"
capabilities = "CAPABILITY_NAMED_IAM"
confirm_changeset = true
disable_rollback = true
parameter_overrides = [
  "Environment=prod",
  "SecretName=CHANGE_ME/j7website/short-url/prod/db",
  "BaseUrl=https://CHANGE_ME.execute-api.ap-southeast-2.amazonaws.com/prod",
  "LogRetentionDays=90",
  "FunctionRoleName=j7website-short-url-prod-role",
  "PermissionsBoundaryArn=arn:aws:iam::857475015624:policy/boundary-j7website-team"
]
