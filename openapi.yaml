openapi: 3.0.3
info:
  title: J7Website Short URL Service
  description: >-
    Phase 1 module of the J7Website platform: creates short codes, redirects
    visitors to the original destination, and records an append-only click
    audit trail. See docs/architecture.md for full design rationale.
  version: '1.0'
servers:
  - url: http://localhost:3003
    description: >-
      Local dev (npm run start:dev). Matches PORT=3003 in .env - edit this
      URL (and .env's PORT) together if your local port differs.
  - url: https://s.jseven.ai
    description: >-
      Deployed (dev) - custom domain, fronts CloudFront. Requires the DNS
      CNAME (s.jseven.ai -> CloudFront distribution domain) to be set - see
      SETUP.md.
  - url: https://fu58hr6q60.execute-api.ap-southeast-2.amazonaws.com/dev
    description: Deployed (dev) - direct API Gateway, bypasses CloudFront/domain, useful for debugging.

# No auth in Phase 1 - see docs/architecture.md. Explicit empty array (rather
# than omitting `security`) documents that this is deliberate, not an
# oversight.
security: []

tags:
  - name: Short URL
  - name: Health

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok

  /short-url:
    post:
      tags: [Short URL]
      summary: Create a short URL
      operationId: createShortUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShortUrlRequest'
            example:
              destination: https://example.com/some/long/path?utm_source=sms
      responses:
        '201':
          description: Short URL created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShortUrlResponse'
              example:
                id: 3a9c1e4a-1234-4a1b-9abc-1234567890ab
                code: Ab12Cd
                shortUrl: https://s.jseven.ai/r/Ab12Cd
        '400':
          description: Request validation failed (e.g. destination is not a valid URL)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                error: ValidationError
                message: Request validation failed
                issues:
                  - path: destination
                    message: Invalid url
        '500':
          description: Ran out of short-code generation attempts (extremely rare)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: InternalError
                message: Failed to generate a unique short code after 5 attempts

  /short-url/bulk:
    post:
      tags: [Short URL]
      summary: Create many short URLs in one batch
      description: >-
        Optimized bulk creation for campaigns (e.g. one short URL per patient
        row from an external patient table) - one DB round trip to check
        code uniqueness and one to insert, regardless of batch size, instead
        of one create() call per item. Each item's destination is used
        as-is; this endpoint does not template or derive destinations. See
        docs/architecture.md ("Bulk short URL creation").
      operationId: createShortUrlBulk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShortUrlBulkRequest'
            example:
              items:
                - destination: https://example.com/review?patient=1
                  createdBy: 'patient:1'
                - destination: https://example.com/review?patient=2
                  createdBy: 'patient:2'
      responses:
        '201':
          description: All short URLs created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShortUrlBulkResponse'
              example:
                created: 2
                results:
                  - destination: https://example.com/review?patient=1
                    code: Ab12Cd
                    shortUrl: https://s.jseven.ai/r/Ab12Cd
                    createdBy: 'patient:1'
                  - destination: https://example.com/review?patient=2
                    code: Ef34Gh
                    shortUrl: https://s.jseven.ai/r/Ef34Gh
                    createdBy: 'patient:2'
        '400':
          description: >-
            Request validation failed (e.g. an empty/oversized items array,
            or a non-URL destination in one of the items)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                error: ValidationError
                message: Request validation failed
                issues:
                  - path: items.0.destination
                    message: Invalid url
        '500':
          description: Ran out of short-code generation attempts (extremely rare)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: InternalError
                message: Failed to generate a unique short code after 5 attempts

  /short-url/{code}:
    get:
      tags: [Short URL]
      summary: Get click stats and details for a short URL
      description: >-
        Includes clickCount/lastAccessedAt (aggregate) and clicks (the most
        recent individual click-log rows, newest first, capped at 50).
      operationId: getShortUrlStats
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: Ab12Cd
      responses:
        '200':
          description: Short URL details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShortUrlStatsResponse'
              example:
                id: 3a9c1e4a-1234-4a1b-9abc-1234567890ab
                code: Ab12Cd
                destination: https://example.com/some/long/path?utm_source=sms
                shortUrl: https://s.jseven.ai/r/Ab12Cd
                clickCount: 5
                createdAt: '2026-07-15T10:00:00.000Z'
                lastAccessedAt: '2026-07-18T11:56:51.000Z'
                expiresAt: null
                status: ACTIVE
                clicks:
                  - clickedAt: '2026-07-18T11:56:51.000Z'
                    ipAddress: 203.0.113.5
                    userAgent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
                    referer: ''
                    country: IN
                    region: Tamil Nadu
                    city: Chennai
                    deviceType: desktop
                    browser: Chrome
                    operatingSystem: Windows
                    isBot: false
                    responseStatus: 302
                    redirectUrl: https://example.com/some/long/path?utm_source=sms
        '404':
          description: No short URL exists for this code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: NotFound
                message: Short URL with code "Ab12Cd" was not found

  /short-url/{code}/clicks:
    get:
      tags: [Short URL]
      summary: Get all click details for a short URL
      description: >-
        Dedicated click-detail listing for a short URL - one entry per past
        redirect, newest first. Unlike /short-url/{code}'s embedded `clicks`
        (capped at 50), this defaults to and caps at 1000 rows, and accepts an
        optional `limit` to narrow that.
      operationId: getShortUrlClicks
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: Ab12Cd
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 1000
          description: Maximum number of click rows to return. Clamped to [1, 1000].
      responses:
        '200':
          description: Click details for the short URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShortUrlClicksResponse'
              example:
                code: Ab12Cd
                clickCount: 5
                clicks:
                  - clickedAt: '2026-07-18T11:56:51.000Z'
                    ipAddress: 203.0.113.5
                    userAgent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
                    referer: ''
                    country: IN
                    region: Tamil Nadu
                    city: Chennai
                    deviceType: desktop
                    browser: Chrome
                    operatingSystem: Windows
                    isBot: false
                    responseStatus: 302
                    redirectUrl: https://example.com/some/long/path?utm_source=sms
        '404':
          description: No short URL exists for this code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: NotFound
                message: Short URL with code "Ab12Cd" was not found

  /r/{code}:
    get:
      tags: [Short URL]
      summary: Redirect to the destination for a short code
      description: >-
        302-redirects to the stored destination, incrementing click_count and
        writing one immutable row to the click-log audit trail in the same
        transaction. No audit row is written on a 404.
      operationId: redirectShortUrl
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: Ab12Cd
      responses:
        '302':
          description: Redirect to the destination
          headers:
            Location:
              schema:
                type: string
                format: uri
              description: The stored destination URL
        '404':
          description: No short URL exists for this code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: NotFound
                message: Short URL with code "Ab12Cd" was not found

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    CreateShortUrlRequest:
      type: object
      required: [destination]
      properties:
        destination:
          type: string
          format: uri
          description: The URL to redirect to.

    ShortUrlResponse:
      type: object
      required: [id, code, shortUrl]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          description: 6-character Base62 short code.
        shortUrl:
          type: string
          format: uri
          description: '`${BASE_URL}/r/{code}`'

    ShortUrlStatsResponse:
      type: object
      required: [id, code, destination, shortUrl, clickCount, createdAt, lastAccessedAt, expiresAt, status, clicks]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        destination:
          type: string
          format: uri
        shortUrl:
          type: string
          format: uri
        clickCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        lastAccessedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [ACTIVE, EXPIRED, DISABLED]
        clicks:
          type: array
          description: Most recent click-log rows, newest first, capped at 50.
          items:
            $ref: '#/components/schemas/ClickLogEntry'

    ShortUrlClicksResponse:
      type: object
      required: [code, clickCount, clicks]
      properties:
        code:
          type: string
        clickCount:
          type: integer
        clicks:
          type: array
          description: Most recent click-log rows, newest first, capped at (and defaulting to) 1000.
          items:
            $ref: '#/components/schemas/ClickLogEntry'

    ClickLogEntry:
      type: object
      required:
        [clickedAt, ipAddress, userAgent, referer, country, region, city, deviceType, browser, operatingSystem, isBot, responseStatus, redirectUrl]
      properties:
        clickedAt:
          type: string
          format: date-time
        ipAddress:
          type: string
        userAgent:
          type: string
        referer:
          type: string
        country:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        deviceType:
          type: string
        browser:
          type: string
          nullable: true
        operatingSystem:
          type: string
          nullable: true
        isBot:
          type: boolean
        responseStatus:
          type: integer
        redirectUrl:
          type: string
          format: uri
          description: The destination this click was redirected to (at the time of the click).

    CreateShortUrlBulkRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 2000
          description: >-
            Capped well under the Lambda synchronous-invocation payload
            ceiling (6 MB) - chunk larger campaigns client-side across
            multiple requests.
          items:
            type: object
            required: [destination]
            properties:
              destination:
                type: string
                format: uri
                description: The URL to redirect to.
              createdBy:
                type: string
                maxLength: 200
                description: >-
                  Optional caller-supplied tag (e.g. a patient/campaign
                  identifier) stored verbatim on the created short_urls row,
                  for correlating this batch back to its source later.

    ShortUrlBulkResponse:
      type: object
      required: [created, results]
      properties:
        created:
          type: integer
          description: Number of short URLs created in this batch.
        results:
          type: array
          description: >-
            One entry per input item, in the same order as the request's
            `items` array.
          items:
            type: object
            required: [destination, code, shortUrl]
            properties:
              destination:
                type: string
                format: uri
              code:
                type: string
              shortUrl:
                type: string
                format: uri
              createdBy:
                type: string

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string

    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            issues:
              type: array
              items:
                type: object
                properties:
                  path:
                    type: string
                  message:
                    type: string
